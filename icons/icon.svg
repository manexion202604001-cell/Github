<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 古河めぐり スタンプラリー アプリアイコン（雪華×ハンコ） -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14293f"/>
      <stop offset="0.6" stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#2f5d8a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 朱印の外円 -->
  <circle cx="256" cy="256" r="164" fill="none" stroke="#c0392b" stroke-width="18"/>
  <circle cx="256" cy="256" r="140" fill="#c0392b" opacity="0.14"/>
  <!-- 雪華（六花）モチーフ -->
  <g stroke="#f7f4ec" stroke-width="16" stroke-linecap="round" fill="none">
    <g id="arm">
      <line x1="256" y1="256" x2="256" y2="136"/>
      <line x1="256" y1="176" x2="228" y2="150"/>
      <line x1="256" y1="176" x2="284" y2="150"/>
      <line x1="256" y1="216" x2="234" y2="196"/>
      <line x1="256" y1="216" x2="278" y2="196"/>
    </g>
    <use href="#arm" transform="rotate(60 256 256)"/>
    <use href="#arm" transform="rotate(120 256 256)"/>
    <use href="#arm" transform="rotate(180 256 256)"/>
    <use href="#arm" transform="rotate(240 256 256)"/>
    <use href="#arm" transform="rotate(300 256 256)"/>
  </g>
  <circle cx="256" cy="256" r="22" fill="#c9a227"/>
</svg>
